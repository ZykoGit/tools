<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Color Converter — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Color Converter</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input Color</h2>
        <input id="color-input" placeholder="#3498db, rgb(52,152,219), hsl(204,70%,53%)" />

        <div class="button-row">
            <button id="convert-btn">Convert</button>
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Converted Values</h2>
        <textarea id="output" readonly placeholder="Converted color formats will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
            <button id="download-btn">Download Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Preview</h2>
        <div id="preview-box"></div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>
        <pre class="sample-box" id="sample-color">#3498db</pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JSON Formatter — Toolbox</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="../../global.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
    <header>
        <h1><a href="../../" class="home-link">Toolbox</a></h1>
        <p>JSON Formatter</p>
    </header>

    <main class="tool-container">

        <section class="tool-section">
            <h2>Input JSON</h2>
            <textarea id="json-input" placeholder="Paste JSON here..."></textarea>

            <div class="button-row">
                <button id="format-btn">Format</button>
                <button id="minify-btn">Minify</button>
                <button id="clear-btn">Clear</button>
            </div>
        </section>

        <section class="tool-section">
            <h2>Output</h2>
            <textarea id="json-output" readonly placeholder="Formatted JSON will appear here..."></textarea>
        </section>

        <section class="tool-section">
            <h2>Sample JSON</h2>
            <pre class="sample-box" id="sample-json">
{
    "name": "Micaiah",
    "project": "Toolbox",
    "features": ["formatting", "conversion", "utilities"],
    "active": true,
    "version": 1.0
}
            </pre>
            <button id="load-sample-btn">Load Sample</button>
        </section>

    </main>

    <footer>
        <p>© 2026 Toolbox — Zykonix</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HTML → Blob Launcher — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>HTML → Blob Launcher</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input HTML</h2>
        <textarea id="input" placeholder="Paste HTML here or upload a file..."></textarea>

        <div class="button-row">
            <button id="generate-btn">Generate Blob Launcher</button>
            <button id="run-btn">Open as Blob</button>
            <button id="clear-btn">Clear</button>
        </div>

        <div class="button-row">
            <input type="file" id="file-input" accept=".html,.htm,text/html" />
        </div>
    </section>

    <section class="tool-section">
        <h2>Generated Launcher Code</h2>
        <textarea id="output" readonly placeholder="Generated JavaScript blob launcher will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Code</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample HTML</h2>

        <pre class="sample-box" id="sample-text" readonly>
&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;body&gt;
&lt;h1&gt;Hello from a Blob&lt;/h1&gt;
&lt;p&gt;This HTML will open inside a blob URL.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

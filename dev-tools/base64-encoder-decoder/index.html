<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Base64 Encoder/Decoder — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
    <header>
        <h1><a href="../../" class="home-link">Toolbox</a></h1>
        <p>Base64 Encoder/Decoder</p>
    </header>

    <main class="tool-container">

        <!-- Input -->
        <section class="tool-section">
            <h2>Input</h2>
            <textarea id="input-text" placeholder="Enter text or Base64 here..."></textarea>

            <div class="button-row">
                <button id="encode-btn">Encode → Base64</button>
                <button id="decode-btn">Decode ← Base64</button>
                <button id="clear-btn">Clear</button>
            </div>
        </section>

        <!-- Output -->
        <section class="tool-section">
            <h2>Output</h2>
            <textarea id="output-text" readonly placeholder="Output will appear here..."></textarea>

            <div class="button-row">
                <button id="copy-btn">Copy Output</button>
                <button id="download-btn">Download Output</button>
            </div>
        </section>

        <!-- Sample -->
        <section class="tool-section">
            <h2>Sample Text</h2>
            <pre class="sample-box" id="sample-text">
Hello, this is a Base64 test!
            </pre>

            <div class="button-row sample-btn-row">
                <button id="load-sample-btn">Load Sample</button>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 Toolbox — Zykonix</p>
    </footer>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Image Data URL Encoder — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Image Data URL Encoder</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Select Image</h2>

        <input type="file" id="file-input" accept="image/*">

        <div id="preview-box"></div>
    </section>

    <section class="tool-section">
        <h2>Data URL Output</h2>

        <textarea id="output" readonly placeholder="Your Base64 Data URL will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

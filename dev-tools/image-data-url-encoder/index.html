<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Image Data URL Encoder/Decoder — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Image Data URL Encoder / Decoder</p>
</header>

<main class="tool-container">

    <!-- ENCODE SECTION -->
    <section class="tool-section">
        <h2>Encode Image → Data URL</h2>

        <input type="file" id="file-input" accept="image/*">

        <div id="preview-box"></div>

        <textarea id="output" readonly placeholder="Your Data URL will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy</button>
        </div>
    </section>

    <!-- DECODE SECTION -->
    <section class="tool-section">
        <h2>Decode Data URL → Image File</h2>

        <textarea id="decode-input" placeholder="Paste any data URL here..."></textarea>

        <div class="button-row">
            <button id="decode-btn">Decode</button>
            <button id="download-btn" disabled>Download</button>
        </div>

        <div id="decode-preview"></div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

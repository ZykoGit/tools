<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Date/Time Calculator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Date/Time Calculator</p>
</header>

<main class="tool-container">

    <!-- Date Difference -->
    <section class="tool-section">
        <h2>Date Difference</h2>

        <div class="button-row">
            <input type="date" id="date1">
            <input type="date" id="date2">
        </div>

        <div class="button-row">
            <button id="diff-btn">Calculate Difference</button>
        </div>

        <textarea id="diff-output" readonly placeholder="Difference will appear here..."></textarea>
    </section>

    <!-- Add/Subtract Time -->
    <section class="tool-section">
        <h2>Add / Subtract Time</h2>

        <div class="button-row">
            <input type="datetime-local" id="base-datetime">
        </div>

        <div class="button-row">
            <input type="number" id="add-days" placeholder="Days">
            <input type="number" id="add-hours" placeholder="Hours">
            <input type="number" id="add-mins" placeholder="Minutes">
        </div>

        <div class="button-row">
            <button id="add-btn">Apply</button>
        </div>

        <textarea id="add-output" readonly placeholder="Result will appear here..."></textarea>
    </section>

    <!-- Timestamp Converter -->
    <section class="tool-section">
        <h2>Unix Timestamp Converter</h2>

        <div class="button-row">
            <input type="number" id="timestamp" placeholder="Enter Unix timestamp">
        </div>

        <div class="button-row">
            <button id="ts-to-date-btn">To Date</button>
            <button id="date-to-ts-btn">Now → Timestamp</button>
        </div>

        <textarea id="ts-output" readonly placeholder="Converted value will appear here..."></textarea>
    </section>

    <!-- Current Time -->
    <section class="tool-section">
        <h2>Current Date & Time</h2>

        <div class="button-row">
            <button id="now-btn">Insert Current Time</button>
        </div>

        <textarea id="now-output" readonly placeholder="Current time will appear here..."></textarea>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

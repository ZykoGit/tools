<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Random Number Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Random Number Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Settings</h2>

        <div class="button-row">
            <input type="number" id="min" placeholder="Min" />
            <input type="number" id="max" placeholder="Max" />
        </div>

        <div class="button-row">
            <input type="number" id="count" placeholder="How many?" />
        </div>

        <div class="button-row">
            <label><input type="radio" name="type" value="int" checked> Integer</label>
            <label><input type="radio" name="type" value="float"> Decimal</label>
        </div>

        <div class="button-row">
            <input type="number" id="decimals" placeholder="Decimals (if float)" />
        </div>

        <div class="button-row">
            <label><input type="checkbox" id="unique"> No repeats</label>
        </div>

        <div class="button-row">
            <button id="generate-btn">Generate</button>
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Output</h2>
        <textarea id="output" readonly placeholder="Generated numbers will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>

        <pre class="sample-box" id="sample-text" readonly>
Min: 1
Max: 100
Count: 10
Type: Integer
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

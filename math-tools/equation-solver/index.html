<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Equation Solver — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Equation Solver</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input Equation</h2>
        <textarea id="input" placeholder="Enter an equation like: 2x + 5 = 17"></textarea>

        <div class="button-row">
            <button id="solve-btn">Solve</button>
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Solution</h2>
        <textarea id="output" readonly placeholder="Solution will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>

        <pre class="sample-box" id="sample-text" readonly>
2x + 5 = 17
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Statistics Calculator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Statistics Calculator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input Numbers</h2>
        <textarea id="input" placeholder="Enter numbers separated by spaces or newlines..."></textarea>

        <div class="button-row">
            <label><input type="radio" name="mode" value="population" checked> Population</label>
            <label><input type="radio" name="mode" value="sample"> Sample</label>
        </div>

        <div class="button-row">
            <button id="calc-btn">Calculate</button>
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Results</h2>
        <textarea id="output" readonly placeholder="Statistics will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Results</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample Data</h2>

        <pre class="sample-box" id="sample-text" readonly>
12 15 20 20 22 25 30 30 30 40
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

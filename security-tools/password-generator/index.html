<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Password Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Password Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Options</h2>

        <div class="button-row">
            <label>Password Length: <span id="length-label">16</span></label>
            <input type="range" id="length" min="4" max="64" value="16">
        </div>

        <div class="button-row">
            <label><input type="checkbox" id="lowercase" checked> Lowercase (a–z)</label>
        </div>

        <div class="button-row">
            <label><input type="checkbox" id="uppercase" checked> Uppercase (A–Z)</label>
        </div>

        <div class="button-row">
            <label><input type="checkbox" id="numbers" checked> Numbers (0–9)</label>
        </div>

        <div class="button-row">
            <label><input type="checkbox" id="symbols" checked> Symbols (!@#$...)</label>
        </div>

        <div class="button-row">
            <button id="generate-btn">Generate Password</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Generated Password</h2>

        <input id="output" readonly placeholder="Your password will appear here...">

        <div class="button-row">
            <button id="copy-btn">Copy</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

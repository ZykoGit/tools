<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ASCII Art Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />

    <!-- FIGlet.js -->
    <script src="https://cdn.jsdelivr.net/npm/figlet@1.5.2/figlet.min.js"></script>

    <!-- Configure FIGlet font path -->
    <script>
        figlet.defaults({
            fontPath: "https://cdn.jsdelivr.net/npm/figlet/fonts/"
        });
    </script>
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>ASCII Art Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Generate ASCII Art</h2>

        <textarea id="text-input" rows="3" placeholder="Type text here..."></textarea>

        <label for="font-select">Font:</label>
        <select id="font-select"></select>

        <div class="button-row">
            <button id="generate-btn">Generate</button>
            <button id="copy-btn">Copy</button>
        </div>

        <pre id="ascii-output" class="output-box">ASCII art will appear here.</pre>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Metadata Viewer — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Metadata Viewer</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Select Image</h2>

        <input type="file" id="file-input" accept="image/*">

        <div class="button-row">
            <button id="clear-btn">Clear</button>
        </div>

        <img id="preview" style="max-width:100%; display:none; margin-top:10px; border-radius:6px;">
    </section>

    <section class="tool-section">
        <h2>Metadata</h2>

        <pre id="metadata-box" class="metadata-box">No metadata loaded.</pre>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

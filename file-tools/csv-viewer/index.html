<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CSV Viewer — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>CSV Viewer</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Upload CSV File</h2>

        <input type="file" id="file-input" accept=".csv,text/csv">

        <div class="button-row">
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Table Preview</h2>

        <div id="table-container" class="table-container">
            <p>No CSV loaded.</p>
        </div>

        <a id="download-link" style="display:none;" download="cleaned.csv">Download Cleaned CSV</a>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

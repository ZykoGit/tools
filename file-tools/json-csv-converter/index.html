<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JSON ⇄ CSV Converter — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>JSON ⇄ CSV Converter</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input</h2>

        <textarea id="input-box" placeholder="Paste JSON or CSV here..."></textarea>

        <div class="button-row">
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Conversion</h2>

        <div class="button-row">
            <button id="json-to-csv-btn">Convert JSON → CSV</button>
            <button id="csv-to-json-btn">Convert CSV → JSON</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Output</h2>

        <textarea id="output-box" placeholder="Converted result will appear here..." readonly></textarea>

        <a id="download-link" style="display:none;" download="converted.txt">Download Result</a>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

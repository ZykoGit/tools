<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gradient Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Gradient Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Colors</h2>

        <div id="color-list"></div>

        <div class="button-row">
            <button id="add-color-btn">Add Color</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Direction</h2>

        <select id="direction">
            <option value="to right">Left → Right</option>
            <option value="to bottom">Top → Bottom</option>
            <option value="to bottom right">Diagonal TL → BR</option>
            <option value="to bottom left">Diagonal TR → BL</option>
            <option value="radial">Radial</option>
            <option value="conic">Conic</option>
        </select>
    </section>

    <section class="tool-section">
        <h2>Preview</h2>

        <div id="gradient-preview"></div>

        <textarea id="css-output" readonly placeholder="CSS will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-css-btn">Copy CSS</button>
            <button id="download-png-btn">Download PNG</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

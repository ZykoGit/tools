<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Breakpoint Tester — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />

    <!-- PNG export -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Responsive Breakpoint Tester</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Settings</h2>

        <label>Website URL</label>
        <input type="text" id="url-input" placeholder="https://example.com">

        <label>Breakpoint Width (px)</label>
        <input type="range" id="width-slider" min="200" max="2000" value="1200">
        <div class="width-display">Width: <span id="width-value">1200</span>px</div>

        <label>Device Presets</label>
        <select id="device-select">
            <option value="custom">Custom</option>
            <option value="375">iPhone 14 (375px)</option>
            <option value="414">iPhone 14 Pro Max (414px)</option>
            <option value="768">iPad Portrait (768px)</option>
            <option value="1024">iPad Landscape (1024px)</option>
            <option value="1280">Laptop (1280px)</option>
            <option value="1440">Desktop (1440px)</option>
            <option value="1920">1080p Monitor (1920px)</option>
        </select>

        <button id="rotate-btn">Rotate</button>
        <button id="load-btn">Load Website</button>
    </section>

    <section class="tool-section">
        <h2>Preview</h2>

        <div id="frame-wrapper">
            <div id="frame-scaler">
                <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
            </div>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

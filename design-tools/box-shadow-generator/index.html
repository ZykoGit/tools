<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Box Shadow Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Box Shadow Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Shadow Controls</h2>

        <label>Horizontal Offset</label>
        <input type="range" id="offset-x" min="-50" max="50" value="10">

        <label>Vertical Offset</label>
        <input type="range" id="offset-y" min="-50" max="50" value="10">

        <label>Blur Radius</label>
        <input type="range" id="blur" min="0" max="100" value="30">

        <label>Spread Radius</label>
        <input type="range" id="spread" min="-50" max="50" value="0">

        <label>Opacity</label>
        <input type="range" id="opacity" min="0" max="1" step="0.01" value="0.25">

        <label>Shadow Color</label>
        <input type="color" id="shadow-color" value="#000000">

        <label><input type="checkbox" id="inset"> Inset Shadow</label>
    </section>

    <section class="tool-section">
        <h2>Preview</h2>

        <div id="shadow-preview"></div>

        <textarea id="css-output" readonly placeholder="CSS will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-css-btn">Copy CSS</button>
            <button id="download-png-btn">Download PNG</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

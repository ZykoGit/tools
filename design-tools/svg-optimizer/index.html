<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SVG Optimizer — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>SVG Optimizer</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Upload SVG</h2>

        <input type="file" id="file-input" accept=".svg">

        <div class="button-row">
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Options</h2>

        <label><input type="checkbox" id="remove-comments" checked> Remove comments</label>
        <label><input type="checkbox" id="remove-metadata" checked> Remove metadata</label>
        <label><input type="checkbox" id="pretty-print"> Pretty print</label>

        <div class="button-row">
            <button id="optimize-btn">Optimize</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Optimized SVG</h2>

        <textarea id="output" readonly placeholder="Optimized SVG will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy</button>
            <button id="download-btn">Download</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

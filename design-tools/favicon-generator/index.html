<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta-name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Favicon Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Favicon Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Upload Image</h2>

        <input type="file" id="file-input" accept="image/*">

        <div class="button-row">
            <button id="clear-btn">Clear</button>
        </div>

        <img id="preview" style="max-width:150px; display:none; margin-top:10px; border-radius:6px;">
    </section>

    <section class="tool-section">
        <h2>Select Sizes</h2>

        <label><input type="checkbox" class="size-option" value="16"> 16×16</label>
        <label><input type="checkbox" class="size-option" value="32" checked> 32×32</label>
        <label><input type="checkbox" class="size-option" value="48"> 48×48</label>
        <label><input type="checkbox" class="size-option" value="64"> 64×64</label>
        <label><input type="checkbox" class="size-option" value="128"> 128×128</label>
        <label><input type="checkbox" class="size-option" value="256"> 256×256</label>

        <div class="button-row">
            <button id="generate-btn">Generate Favicons</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Output</h2>

        <div id="results"></div>

        <div class="button-row">
            <button id="download-all-btn">Download All (ZIP)</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

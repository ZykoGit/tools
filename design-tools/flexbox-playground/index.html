<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flexbox Playground — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Flexbox Playground</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Container Controls</h2>

        <label>Flex Direction</label>
        <select id="flex-direction">
            <option value="row">Row</option>
            <option value="row-reverse">Row Reverse</option>
            <option value="column">Column</option>
            <option value="column-reverse">Column Reverse</option>
        </select>

        <label>Justify Content</label>
        <select id="justify-content">
            <option value="flex-start">Flex Start</option>
            <option value="center">Center</option>
            <option value="flex-end">Flex End</option>
            <option value="space-between">Space Between</option>
            <option value="space-around">Space Around</option>
            <option value="space-evenly">Space Evenly</option>
        </select>

        <label>Align Items</label>
        <select id="align-items">
            <option value="stretch">Stretch</option>
            <option value="flex-start">Flex Start</option>
            <option value="center">Center</option>
            <option value="flex-end">Flex End</option>
        </select>

        <label>Flex Wrap</label>
        <select id="flex-wrap">
            <option value="nowrap">No Wrap</option>
            <option value="wrap">Wrap</option>
            <option value="wrap-reverse">Wrap Reverse</option>
        </select>

        <label>Gap (px)</label>
        <input type="range" id="gap" min="0" max="50" value="10">

        <label>Number of Items</label>
        <input type="range" id="item-count" min="1" max="12" value="6">
    </section>

    <section class="tool-section">
        <h2>Item Controls</h2>

        <label>Item Width (px)</label>
        <input type="range" id="item-width" min="40" max="200" value="80">

        <label>Item Height (px)</label>
        <input type="range" id="item-height" min="40" max="200" value="80">

        <label>Flex Grow</label>
        <input type="range" id="flex-grow" min="0" max="5" value="0">

        <label>Flex Shrink</label>
        <input type="range" id="flex-shrink" min="0" max="5" value="1">

        <label>Flex Basis (px)</label>
        <input type="range" id="flex-basis" min="0" max="300" value="80">
    </section>

    <section class="tool-section">
        <h2>Preview</h2>

        <div id="flex-preview"></div>

        <textarea id="css-output" readonly placeholder="CSS will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-css-btn">Copy CSS</button>
            <button id="download-png-btn">Download PNG</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>

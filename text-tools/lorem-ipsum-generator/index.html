<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lorem Ipsum Generator — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Lorem Ipsum Generator</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Paragraph Count</h2>
        <input id="para-count" type="number" min="1" max="20" value="3" />

        <div class="button-row">
            <button id="generate-btn">Generate</button>
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Output</h2>
        <textarea id="output" readonly placeholder="Lorem ipsum text will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>
        <pre class="sample-box" id="sample-text">
Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>URL Encoder/Decoder — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>URL Encoder/Decoder</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input</h2>

        <textarea id="input" placeholder="Paste HTML or a data:text/html URL..."></textarea>

        <div class="button-row">
            <button id="encode-btn">Encode → data:text/html</button>
            <button id="decode-btn">Decode URL</button>
            <button id="clear-btn">Clear</button>
        </div>

        <div class="button-row">
            <input type="file" id="file-input" accept=".html,.htm,text/html" />
        </div>
    </section>

    <section class="tool-section">
        <h2>Output</h2>

        <textarea id="output" readonly placeholder="Encoded or decoded result will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>

        <pre class="sample-box" id="sample-text">
<!DOCTYPE html>
<html>
<body>
<h1>Hello World</h1>
<p>This is sample HTML.</p>
</body>
</html>
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Text Analyzer — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Text Analyzer</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input</h2>
        <textarea id="input" placeholder="Enter text to analyze..."></textarea>

        <div class="button-row">
            <button id="analyze-btn">Analyze</button>
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Analysis</h2>
        <textarea id="output" readonly placeholder="Analysis results will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>
        <pre class="sample-box" id="sample-text">
This is a sample paragraph. It contains multiple sentences.

Here is another paragraph to test paragraph counting.
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

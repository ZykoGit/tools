<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Case Converter — Toolbox</title>

    <link rel="stylesheet" href="../../global.css" />
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="apple-touch-icon" href="../../favicon.png" />
</head>

<body>
<header>
    <h1><a href="../../" class="home-link">Toolbox</a></h1>
    <p>Case Converter</p>
</header>

<main class="tool-container">

    <section class="tool-section">
        <h2>Input</h2>
        <textarea id="input" placeholder="Enter your text here..."></textarea>

        <div class="button-row">
            <button data-mode="upper" class="case-btn">UPPERCASE</button>
            <button data-mode="lower" class="case-btn">lowercase</button>
            <button data-mode="title" class="case-btn">Title Case</button>
            <button data-mode="sentence" class="case-btn">Sentence case</button>
        </div>

        <div class="button-row">
            <button id="clear-btn">Clear</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Output</h2>
        <textarea id="output" readonly placeholder="Converted text will appear here..."></textarea>

        <div class="button-row">
            <button id="copy-btn">Copy Output</button>
        </div>
    </section>

    <section class="tool-section">
        <h2>Sample</h2>
        <pre class="sample-box" id="sample-text">
this is a sample sentence. it should become something nicer.
        </pre>

        <div class="button-row sample-btn-row">
            <button id="load-sample-btn">Load Sample</button>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Toolbox — Zykonix</p>
</footer>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>

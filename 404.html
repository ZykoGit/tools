<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 — Page Not Found</title>

    <link rel="stylesheet" href="global.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />

    <style>
        .center-box {
            max-width: 600px;
            margin: 8rem auto;
            text-align: center;
            padding: 2rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
        }

        .center-box h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #4a90e2;
        }

        .center-box p {
            font-size: 1.2rem;
            opacity: 0.85;
            margin-bottom: 2rem;
        }

        .home-btn {
            display: inline-block;
            padding: 0.8rem 1.6rem;
            background: #4a90e2;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: #357ac9;
        }
    </style>
</head>

<body>

<div class="center-box">
    <h1>404</h1>
    <p>Looks like this tool wandered off into the void.</p>
    <a href="/" class="home-btn">Return to Toolbox</a>
</div>

</body>
</html>

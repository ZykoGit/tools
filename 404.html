<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 — Page Not Found</title>

    <link rel="stylesheet" href="global.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />

    <style>
        .center-box {
    max-width: 600px;
    margin: 8rem auto;
    text-align: center;
    padding: 2.5rem;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 18px;
    backdrop-filter: blur(18px);
    box-shadow: 0 0 28px rgba(0, 0, 0, 0.45),
                0 0 22px rgba(90, 180, 255, 0.25);
}

/* HOLOGRAPHIC TITLE */
.center-box h1 {
    font-size: 4rem;
    margin-bottom: 1rem;
    background: linear-gradient(90deg, #4ac8ff, #b37bff);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 0 22px rgba(90, 180, 255, 0.5);
}

/* DESCRIPTION TEXT */
.center-box p {
    font-size: 1.25rem;
    opacity: 0.9;
    margin-bottom: 2.2rem;
    color: #e8ecff;
}

/* NEON BUTTON */
.home-btn {
    display: inline-block;
    padding: 0.9rem 1.8rem;
    background: linear-gradient(90deg, #4ac8ff, #b37bff);
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-size: 1.15rem;
    transition: 0.25s ease;
    box-shadow: 0 0 16px rgba(90, 180, 255, 0.6);
}

/* BUTTON HOVER GLOW */
.home-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 0 26px rgba(179, 123, 255, 0.8);
}

        }
    </style>
</head>

<body>

<div class="center-box">
    <h1>404</h1>
    <p>Looks like this tool wandered off into the void.</p>
    <a href="./" class="home-btn">Return to Toolbox</a>
</div>

</body>
</html>
